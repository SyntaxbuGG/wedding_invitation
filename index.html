<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приглашение на свадьбу</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <section class="hero">
        <h3 class="intro">✨ Вы приглашены на свадьбу ✨</h2>
            <img id="envelope" src="images/evelope.jpg" alt="Конверт">

            <div id="invitation" class="hidden">
                <h1>Жамшидбек & Жамила</h1>
                <p>Будем счастливы разделить с вами один из самых важных дней нашей жизни.
                </p>
                <h2>9 июля 2026</h2>

                <div id="countdown">
                    <div><span id="days">0</span><small>дней</small></div>
                    <div><span id="hours">0</span><small>часов</small></div>
                    <div><span id="minutes">0</span><small>минут</small></div>
                    <div><span id="seconds">0</span><small>секунд</small></div>
                </div>
                <h3>До нашего праздника осталось</h3>

            </div>

            <audio id="music" src="music/music.mp3"></audio>
    </section>
    <script src="java.js"></script>
</body>

</html>
